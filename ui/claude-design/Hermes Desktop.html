<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hermes Desktop</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* ============================ TOKENS ============================ */
:root {
  --ui: -apple-system, "Segoe UI", "Cantarell", "Ubuntu", "Noto Sans", system-ui, sans-serif;
  --mono: "Geist Mono", ui-monospace, "SF Mono", "JetBrains Mono", monospace;
}
.app[data-theme="dark"] {
  --bg-app: #0a0c10;
  --bg-side: #0c0f14;
  --bg-chat: #0a0c10;
  --bg-panel: #12161d;
  --bg-elev: #1a1f29;
  --bg-inset: #07090c;
  --bg-hover: rgba(255,255,255,.045);
  --bg-active: rgba(91,157,255,.10);
  --border: #1e242e;
  --border-soft: #161b23;
  --border-strong: #2a3340;
  --text: #e7eaf1;
  --text-dim: #9aa4b3;
  --text-mute: #5d6675;
  --text-faint: #424b59;
  --accent: #5b9dff;
  --accent-soft: rgba(91,157,255,.14);
  --accent-line: rgba(91,157,255,.45);
  --green: #43d6a0;
  --green-soft: rgba(67,214,160,.14);
  --amber: #e8b657;
  --red: #ff6f6f;
  --add-bg: rgba(67,214,160,.09);
  --add-tx: #79e8bd;
  --del-bg: rgba(255,111,111,.09);
  --del-tx: #ff9b9b;
  --shadow: 0 12px 40px -8px rgba(0,0,0,.6);
  --user-bg: rgba(255,255,255,.025);
}
.app[data-theme="light"] {
  --bg-app: #eef0f3;
  --bg-side: #e9ebef;
  --bg-chat: #fbfbfc;
  --bg-panel: #ffffff;
  --bg-elev: #f2f3f6;
  --bg-inset: #f5f6f8;
  --bg-hover: rgba(15,20,30,.04);
  --bg-active: rgba(40,110,240,.08);
  --border: #e0e3e9;
  --border-soft: #eaecf0;
  --border-strong: #d2d7df;
  --text: #161a21;
  --text-dim: #545d6c;
  --text-mute: #8a93a1;
  --text-faint: #aab1bd;
  --accent: #2f74e8;
  --accent-soft: rgba(47,116,232,.10);
  --accent-line: rgba(47,116,232,.5);
  --green: #11936a;
  --green-soft: rgba(17,147,106,.12);
  --amber: #b67d11;
  --red: #d4493f;
  --add-bg: rgba(17,147,106,.08);
  --add-tx: #0c7a55;
  --del-bg: rgba(212,73,63,.08);
  --del-tx: #b53b32;
  --shadow: 0 12px 36px -10px rgba(30,40,60,.22);
  --user-bg: rgba(15,20,30,.028);
}
/* ---- density ---- */
.app[data-density="compact"] { --gap-msg: 18px; --pad-msg: 10px; --fs: 13px; --lh: 1.55; --row-h: 23px; --pad-side: 12px; }
.app[data-density="medium"]  { --gap-msg: 26px; --pad-msg: 13px; --fs: 14px; --lh: 1.62; --row-h: 26px; --pad-side: 14px; }
.app[data-density="comfy"]   { --gap-msg: 34px; --pad-msg: 17px; --fs: 15px; --lh: 1.72; --row-h: 30px; --pad-side: 16px; }

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--ui);
  background: #000;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow: hidden;
}
#root { height: 100vh; }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 6px; border: 3px solid transparent; background-clip: padding-box; }
::-webkit-scrollbar-thumb:hover { background: var(--text-faint); background-clip: padding-box; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
kbd { font-family: var(--mono); font-size: 10px; padding: 1px 4px; border-radius: 4px; background: var(--bg-elev); border: 1px solid var(--border); color: var(--text-dim); }

/* ============================ APP SHELL ============================ */
.app {
  height: 100vh; display: flex; flex-direction: column;
  background: var(--bg-app); color: var(--text);
  font-size: var(--fs);
}
.titlebar {
  height: 40px; flex: none; display: flex; align-items: center; justify-content: space-between;
  padding: 0 10px 0 12px; background: var(--bg-side);
  border-bottom: 1px solid var(--border-soft); user-select: none;
}
.tb-left, .tb-right { display: flex; align-items: center; gap: 6px; }
.tb-icon { width: 28px; height: 28px; border-radius: 7px; display: grid; place-items: center; color: var(--text-dim); }
.tb-icon:hover { background: var(--bg-hover); color: var(--text); }
.tb-brand { display: flex; align-items: center; gap: 7px; font-weight: 600; font-size: 13px; letter-spacing: .2px; color: var(--text); }
.tb-brand svg { color: var(--accent); }
.tb-context { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--text-dim); padding: 4px 11px; border: 1px solid var(--border); border-radius: 999px; background: var(--bg-panel); white-space: nowrap; }
.tb-center { flex: 1; display: flex; justify-content: center; }
.tb-context svg { color: var(--green); }
.tb-win { display: flex; gap: 8px; margin-left: 8px; }
.win-btn { width: 12px; height: 12px; border-radius: 50%; background: var(--border-strong); }
.win-btn.close { background: #ff5f57; } .win-btn.min { background: #febc2e; } .win-btn.max { background: #28c840; }
.app[data-theme="dark"] .win-btn { opacity: .85; }

.body { flex: 1; display: flex; min-height: 0; }

/* ============================ SIDEBAR ============================ */
.sidebar {
  width: 264px; flex: none; display: flex; flex-direction: column;
  background: var(--bg-side); border-right: 1px solid var(--border-soft); min-height: 0;
}
.side-top { padding: 10px; border-bottom: 1px solid var(--border-soft); }
.side-scroll { flex: 1; overflow-y: auto; padding: 4px 0 16px; }

/* project switcher */
.proj { position: relative; }
.proj-btn { width: 100%; display: flex; align-items: center; gap: 9px; padding: 8px 9px; border-radius: 9px; border: 1px solid var(--border); background: var(--bg-panel); text-align: left; transition: border-color .12s; }
.proj-btn:hover { border-color: var(--border-strong); }
.proj-btn.open { border-color: var(--accent-line); }
.proj-mark { width: 28px; height: 28px; flex: none; border-radius: 7px; display: grid; place-items: center; background: var(--accent-soft); color: var(--accent); }
.proj-meta { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
.proj-name { font-weight: 600; font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.proj-path { font-size: 11px; color: var(--text-mute); font-family: var(--mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.proj-chev { color: var(--text-mute); flex: none; }
.proj-menu { position: absolute; top: calc(100% + 6px); left: 0; right: 0; z-index: 60; background: var(--bg-elev); border: 1px solid var(--border-strong); border-radius: 11px; box-shadow: var(--shadow); padding: 5px; }
.menu-label { font-size: 10px; text-transform: uppercase; letter-spacing: .9px; color: var(--text-mute); padding: 7px 9px 5px; font-weight: 600; }
.proj-item { width: 100%; display: flex; align-items: center; gap: 8px; padding: 7px 9px; border-radius: 7px; color: var(--text-dim); position: relative; }
.proj-item:hover { background: var(--bg-hover); color: var(--text); }
.proj-item.active { color: var(--text); }
.proj-item.active svg:first-child { color: var(--accent); }
.proj-item-name { font-size: 13px; font-weight: 500; }
.proj-item-path { font-size: 11px; color: var(--text-mute); font-family: var(--mono); margin-left: auto; }
.proj-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); margin-left: 8px; }
.proj-item.new { color: var(--accent); font-size: 12.5px; }
.menu-sep { height: 1px; background: var(--border); margin: 5px 4px; }
.menu-scrim { position: fixed; inset: 0; z-index: 50; }

/* sections */
.side-section { padding: 6px 0; }
.side-head { display: flex; align-items: center; justify-content: space-between; padding: 6px 10px 6px 8px; }
.side-head-btn { display: flex; align-items: center; gap: 4px; color: var(--text-mute); }
.side-head-btn:hover { color: var(--text-dim); }
.side-head-chev { transition: transform .15s; }
.side-head-chev.rot { transform: rotate(-90deg); }
.side-title { font-size: 10.5px; font-weight: 700; letter-spacing: 1px; }
.side-act { width: 22px; height: 22px; border-radius: 6px; display: grid; place-items: center; color: var(--text-mute); }
.side-act:hover { background: var(--bg-hover); color: var(--text-dim); }
.side-content { padding: 1px 6px 4px; }

/* file tree */
.tree-row { width: 100%; display: flex; align-items: center; gap: 5px; height: var(--row-h); padding-right: 8px; border-radius: 6px; color: var(--text-dim); font-size: 13px; }
.tree-row:hover { background: var(--bg-hover); color: var(--text); }
.tree-row.file.active { background: var(--bg-active); color: var(--text); }
.tree-row.file.active::before { content: ""; position: absolute; }
.tree-chev { color: var(--text-mute); flex: none; }
.tree-chev-sp { width: 13px; flex: none; }
.tree-ico { flex: none; }
.tree-ico.folder { color: var(--text-mute); }
.tree-row.file.active .tree-ico.file { color: var(--accent); }
.tree-ico.file { color: var(--text-faint); }
.tree-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tree-dim > .tree-row { color: var(--text-faint); }
.tree-dim .tree-ico { color: var(--text-faint); opacity: .6; }

/* sessions */
.sessions { display: flex; flex-direction: column; gap: 1px; }
.session { display: flex; align-items: stretch; gap: 8px; padding: 7px 8px 7px 6px; border-radius: 7px; text-align: left; color: var(--text-dim); }
.session:hover { background: var(--bg-hover); }
.session-bar { width: 2px; flex: none; border-radius: 2px; background: transparent; }
.session.active { background: var(--bg-active); }
.session.active .session-bar { background: var(--accent); }
.session.active .session-title { color: var(--text); }
.session-meta { min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.session-title { font-size: 12.5px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.session-sub { font-size: 11px; color: var(--text-mute); font-family: var(--mono); }

/* context menu */
.ctx-menu { position: fixed; z-index: 60; min-width: 178px; background: var(--bg-elev); border: 1px solid var(--border-strong); border-radius: 10px; box-shadow: var(--shadow); padding: 5px; }
.ctx-file { font-size: 11px; color: var(--text-mute); font-family: var(--mono); padding: 6px 9px 7px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }
.ctx-item { width: 100%; display: flex; align-items: center; gap: 9px; padding: 7px 9px; border-radius: 6px; color: var(--text-dim); font-size: 13px; }
.ctx-item:hover { background: var(--bg-hover); color: var(--text); }
.ctx-item.accent { color: var(--accent); }
.ctx-item.accent:hover { background: var(--accent-soft); }

/* ============================ MAIN / CHAT ============================ */
.main { flex: 1; min-width: 0; display: flex; flex-direction: column; background: var(--bg-chat); }
.chat-head { height: 50px; flex: none; display: flex; align-items: center; justify-content: space-between; padding: 0 18px; border-bottom: 1px solid var(--border-soft); }
.ch-title { display: flex; flex-direction: column; gap: 1px; }
.ch-name { font-weight: 600; font-size: 14px; }
.ch-sub { font-size: 11.5px; color: var(--text-mute); }
.ch-actions { display: flex; gap: 7px; }
.ch-btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 11px; border-radius: 8px; border: 1px solid var(--border); color: var(--text-dim); font-size: 12.5px; background: var(--bg-panel); }
.ch-btn:hover { border-color: var(--border-strong); color: var(--text); }

.thread { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
.thread-inner { max-width: 800px; margin: 0 auto; padding: 26px 28px 8px; display: flex; flex-direction: column; gap: var(--gap-msg); }
.thread-pad { height: 8px; }

/* messages */
.msg { display: flex; gap: 14px; }
.msg-rail { flex: none; width: 30px; display: flex; justify-content: center; }
.avatar { width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center; font-size: 10px; font-weight: 700; letter-spacing: .3px; }
.av-user { background: var(--bg-elev); color: var(--text-dim); border: 1px solid var(--border); text-transform: uppercase; }
.av-bot { background: linear-gradient(150deg, var(--accent-soft), var(--green-soft)); color: var(--accent); border: 1px solid var(--accent-line); }
.msg-body { flex: 1; min-width: 0; padding-top: 3px; }
.msg-author { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 6px; letter-spacing: .2px; }
.msg-user .msg-body { background: var(--user-bg); border: 1px solid var(--border-soft); border-radius: 12px; padding: var(--pad-msg) 15px; }
.msg-attachments { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 9px; }
.attach-chip { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; font-family: var(--mono); color: var(--text-dim); background: var(--bg-elev); border: 1px solid var(--border); padding: 3px 9px 3px 7px; border-radius: 7px; }
.attach-chip svg { color: var(--accent); }

/* ============================ MARKDOWN ============================ */
.md { font-size: var(--fs); line-height: var(--lh); color: var(--text-dim); }
.msg-user .md { color: var(--text); }
.md-p { margin: 0 0 10px; text-wrap: pretty; }
.md-p:last-child { margin-bottom: 0; }
.md .md-h { font-size: calc(var(--fs) + 1px); color: var(--text); font-weight: 650; margin: 16px 0 8px; }
.md-ul, .md-ol { margin: 0 0 11px; padding-left: 20px; }
.md-ul li, .md-ol li { margin: 4px 0; text-wrap: pretty; }
.md-ul li::marker { color: var(--text-faint); }
.md-ol li::marker { color: var(--text-mute); font-family: var(--mono); font-size: .9em; }
.md strong { color: var(--text); font-weight: 650; }
.md em { color: var(--text); font-style: italic; }
.md-code { font-family: var(--mono); font-size: .88em; background: var(--bg-elev); border: 1px solid var(--border-soft); padding: 1px 5px; border-radius: 5px; color: var(--accent); }
.md-pre { position: relative; font-family: var(--mono); font-size: 12.5px; line-height: 1.65; background: var(--bg-inset); border: 1px solid var(--border); border-radius: 10px; padding: 13px 15px; margin: 4px 0 12px; overflow-x: auto; color: var(--text); }
.md-pre code { white-space: pre; }
.md-pre-lang { position: absolute; top: 8px; right: 12px; font-size: 10px; color: var(--text-mute); text-transform: uppercase; letter-spacing: .8px; }
.md-cursor { display: inline-block; width: 7px; height: 15px; transform: translateY(2px); background: var(--accent); border-radius: 1px; margin-left: 1px; animation: blink 1s steps(2) infinite; }
@keyframes blink { 50% { opacity: 0; } }

/* ============================ THINKING ============================ */
.thinking { margin-bottom: 12px; border-left: 2px solid var(--border); padding-left: 0; }
.think-head { display: flex; align-items: center; gap: 7px; padding: 3px 0 3px 11px; color: var(--text-mute); font-size: 12px; font-style: italic; }
.think-head:hover { color: var(--text-dim); }
.think-head svg:first-child { color: var(--text-faint); }
.think-chev { margin-left: 2px; transition: transform .15s; }
.think-chev.open { transform: rotate(90deg); }
.think-body { padding: 4px 0 4px 13px; }
.think-body .md { color: var(--text-mute); font-size: 12.5px; font-style: italic; }
.think-body .md-code { font-style: normal; }

/* ============================ TOOL CARDS ============================ */
.toolcard { margin: 4px 0 12px; border-radius: 11px; overflow: hidden; background: var(--bg-panel); border: 1px solid var(--border); }
.tc-head { width: 100%; display: flex; align-items: center; gap: 9px; padding: 9px 12px; position: relative; text-align: left; }
.tc-head:hover { background: var(--bg-hover); }
.tc-rail { position: absolute; left: 0; top: 0; bottom: 0; width: 0; background: var(--accent); }
.tc-ico { width: 24px; height: 24px; flex: none; border-radius: 6px; display: grid; place-items: center; background: var(--accent-soft); color: var(--accent); }
.tc-green .tc-ico { background: var(--green-soft); color: var(--green); }
.tc-label { font-size: 12px; font-weight: 600; color: var(--text-dim); flex: none; }
.tc-title { font-family: var(--mono); font-size: 12.5px; color: var(--text); font-weight: 500; flex: none; }
.tc-sub { font-family: var(--mono); font-size: 11px; color: var(--text-mute); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tc-spacer { flex: 1; }
.tc-status { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; flex: none; }
.tc-status.st-done { color: var(--green); }
.tc-status.st-running { color: var(--accent); }
.tc-spin { width: 11px; height: 11px; border-radius: 50%; border: 1.6px solid var(--accent-soft); border-top-color: var(--accent); animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.tc-chev { color: var(--text-mute); transition: transform .15s; flex: none; }
.tc-chev.open { transform: rotate(90deg); }
.tc-body { border-top: 1px solid var(--border-soft); font-family: var(--mono); font-size: 12px; line-height: 1.7; background: var(--bg-inset); max-height: 320px; overflow: auto; }
.tc-line { display: flex; }
.tc-read .tc-gutter { flex: none; width: 44px; text-align: right; padding-right: 14px; color: var(--text-faint); user-select: none; }
.tc-read .tc-code { color: var(--text-dim); white-space: pre; padding-right: 14px; }
.tc-read .tc-line:hover { background: var(--bg-hover); }
.tc-hunk { padding: 5px 14px; color: var(--accent); background: var(--accent-soft); font-size: 11.5px; }
.tc-diff .tc-sign { flex: none; width: 26px; text-align: center; user-select: none; color: var(--text-faint); }
.tc-diff .tc-code { white-space: pre; padding-right: 14px; }
.tc-diff .dl-add { background: var(--add-bg); } .tc-diff .dl-add .tc-code, .tc-diff .dl-add .tc-sign { color: var(--add-tx); }
.tc-diff .dl-del { background: var(--del-bg); } .tc-diff .dl-del .tc-code, .tc-diff .dl-del .tc-sign { color: var(--del-tx); }
.tc-diff .dl-ctx .tc-code { color: var(--text-mute); }
.tc-term { padding: 11px 15px; }
.tc-tline { color: var(--text-dim); white-space: pre-wrap; }
.tc-tline:first-child { color: var(--text); }

/* toolcard variants */
.app[data-toolcard="subtle"] .toolcard { background: transparent; border-color: transparent; border-radius: 8px; margin: 2px 0 10px; }
.app[data-toolcard="subtle"] .tc-head { padding: 5px 8px; }
.app[data-toolcard="subtle"] .tc-ico { background: transparent; width: 18px; height: 18px; color: var(--text-mute); }
.app[data-toolcard="subtle"] .tc-green .tc-ico { background: transparent; color: var(--text-mute); }
.app[data-toolcard="subtle"] .tc-label { color: var(--text-mute); font-weight: 500; }
.app[data-toolcard="subtle"] .tc-body { border: 1px solid var(--border-soft); border-radius: 8px; margin: 0 8px 6px; }
.app[data-toolcard="subtle"] .tc-status { font-weight: 500; opacity: .8; }

.app[data-toolcard="bold"] .toolcard { border-width: 1px; }
.app[data-toolcard="bold"] .tc-rail { width: 3px; }
.app[data-toolcard="bold"] .tc-head { padding-left: 15px; }
.app[data-toolcard="bold"] .tc-green .tc-rail { background: var(--green); }
.app[data-toolcard="bold"] .tc-ico { width: 28px; height: 28px; }
.app[data-toolcard="bold"] .toolcard { box-shadow: 0 1px 0 var(--border-soft); }

/* working indicator */
.working { display: flex; align-items: center; gap: 6px; color: var(--text-mute); font-size: 12.5px; padding: 4px 0 0 44px; }
.working-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: pulse 1.2s ease-in-out infinite; }
.working-dot:nth-child(2) { animation-delay: .2s; } .working-dot:nth-child(3) { animation-delay: .4s; margin-right: 4px; }
@keyframes pulse { 0%, 100% { opacity: .25; transform: scale(.8); } 50% { opacity: 1; transform: scale(1); } }

/* ============================ COMPOSER ============================ */
.composer-shell { flex: none; padding: 6px 28px 18px; }
.composer-wrap { max-width: 800px; margin: 0 auto; position: relative; }
.composer { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 14px; padding: 4px; transition: border-color .12s, box-shadow .12s; }
.composer:focus-within { border-color: var(--accent-line); box-shadow: 0 0 0 3px var(--accent-soft); }
.composer.busy { opacity: .92; }
.chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 8px 4px; }
.chip { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; font-family: var(--mono); color: var(--text); background: var(--bg-elev); border: 1px solid var(--border); padding: 3px 5px 3px 8px; border-radius: 7px; }
.chip svg { color: var(--accent); }
.chip-x { width: 16px; height: 16px; border-radius: 4px; display: grid; place-items: center; color: var(--text-mute); }
.chip-x:hover { background: var(--bg-hover); color: var(--text); }
.composer-row { display: flex; align-items: flex-end; gap: 6px; padding: 4px; }
.comp-attach { width: 34px; height: 34px; flex: none; border-radius: 9px; display: grid; place-items: center; color: var(--text-mute); }
.comp-attach:hover { background: var(--bg-hover); color: var(--text-dim); }
.comp-input { flex: 1; resize: none; background: none; border: none; outline: none; color: var(--text); font-family: var(--ui); font-size: var(--fs); line-height: 1.5; padding: 8px 4px; max-height: 220px; }
.comp-input::placeholder { color: var(--text-mute); }
.comp-send { width: 34px; height: 34px; flex: none; border-radius: 9px; display: grid; place-items: center; color: var(--text-mute); background: var(--bg-elev); transition: all .12s; }
.comp-send.ready { background: var(--accent); color: #fff; }
.app[data-theme="light"] .comp-send.ready { color: #fff; }
.comp-send.ready:hover { filter: brightness(1.08); }
.comp-send.stop { background: var(--bg-elev); color: var(--red); }
.comp-send.stop:hover { background: var(--del-bg); }
.composer-foot { display: flex; gap: 14px; padding: 2px 10px 6px; }
.foot-hint { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-mute); }

/* slash palette */
.slash-pal { position: absolute; bottom: calc(100% + 8px); left: 0; right: 0; background: var(--bg-elev); border: 1px solid var(--border-strong); border-radius: 12px; box-shadow: var(--shadow); padding: 6px; z-index: 40; max-height: 280px; overflow: auto; }
.slash-head { display: flex; align-items: center; gap: 6px; font-size: 10px; text-transform: uppercase; letter-spacing: .9px; color: var(--text-mute); padding: 5px 8px 7px; font-weight: 600; }
.slash-item { width: 100%; display: flex; align-items: center; gap: 10px; padding: 8px 9px; border-radius: 8px; text-align: left; color: var(--text-dim); }
.slash-item.on, .slash-item:hover { background: var(--accent-soft); color: var(--text); }
.slash-ico { width: 24px; height: 24px; flex: none; border-radius: 6px; display: grid; place-items: center; background: var(--bg-panel); color: var(--accent); }
.slash-cmd { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--text); flex: none; }
.slash-desc { font-size: 12px; color: var(--text-mute); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ============================ STATUS BAR ============================ */
.statusbar { height: 28px; flex: none; display: flex; align-items: center; justify-content: space-between; padding: 0 6px; background: var(--bg-side); border-top: 1px solid var(--border-soft); font-size: 11.5px; }
.sb-left, .sb-right { display: flex; align-items: center; }
.sb-item { display: inline-flex; align-items: center; gap: 6px; padding: 4px 9px; border-radius: 6px; color: var(--text-dim); height: 22px; }
.sb-item.ghost { color: var(--text-mute); }
.sb-item.btn:hover, .model-btn:hover, .sb-item.conn:hover { background: var(--bg-hover); color: var(--text-dim); }
.sb-item.mono { font-family: var(--mono); font-size: 11px; }
.sb-div { width: 1px; height: 13px; background: var(--border); margin: 0 2px; }
.conn-dot { width: 7px; height: 7px; border-radius: 50%; position: relative; }
.conn-ok .conn-dot { background: var(--green); box-shadow: 0 0 0 0 var(--green); animation: glow 2s ease-out infinite; }
.conn-ok { color: var(--green); }
.conn-warn .conn-dot { background: var(--amber); } .conn-warn { color: var(--amber); }
.conn-bad .conn-dot { background: var(--red); } .conn-bad { color: var(--red); }
@keyframes glow { 0% { box-shadow: 0 0 0 0 var(--green-soft); } 70% { box-shadow: 0 0 0 5px transparent; } 100% { box-shadow: 0 0 0 0 transparent; } }
.model-sw { position: relative; }
.model-btn .model-name { font-family: var(--mono); color: var(--text-dim); font-weight: 500; }
.model-btn .model-via { color: var(--text-mute); }
.model-btn.open { background: var(--bg-hover); }
.model-menu { position: absolute; bottom: calc(100% + 8px); left: 0; min-width: 250px; background: var(--bg-elev); border: 1px solid var(--border-strong); border-radius: 11px; box-shadow: var(--shadow); padding: 5px; z-index: 60; }
.model-item { width: 100%; display: flex; align-items: center; gap: 9px; padding: 7px 9px; border-radius: 7px; color: var(--text-dim); }
.model-item:hover { background: var(--bg-hover); color: var(--text); }
.model-item svg:first-child { color: var(--text-mute); }
.model-item.active { color: var(--text); }
.model-item.active svg:first-child { color: var(--accent); }
.model-item-name { font-family: var(--mono); font-size: 12.5px; flex: 1; }
.model-check { color: var(--accent) !important; }
.tok-bar { width: 34px; height: 4px; border-radius: 3px; background: var(--border); overflow: hidden; }
.tok-fill { display: block; height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 3px; }

/* tweaks panel font fix */
#tweaks-root, .tw-panel { font-family: var(--ui) !important; }
</style>
</head>
